name: Publish Docker image

# Spustí se při push tagu vX.Y.Z (production release)
# nebo manuálně z UI (workflow_dispatch — pro testování).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manuální tag (např. test, edge, 1.2.0-rc1)'
        required: true
        default: 'edge'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # = radekhulan/myinvoice
  # Force JavaScript actions (checkout, setup-node, docker/*, …) na Node 24.
  # Default je Node 20 (deprecated, removal září 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Strategie multi-arch buildu:
#   1) `build` job běží matrixově per platforma na native runneru (amd64 = ubuntu-latest,
#      arm64 = ubuntu-24.04-arm — free hosted od 2025 pro public repos). Každý job
#      pushne single-arch image jen pomocí digestu (--push-by-digest, bez tagů).
#   2) `merge` job stáhne digesty obou platforem a vytvoří manifest list se všemi
#      semver tagy (1.3.0, 1.3, latest). Bez QEMU = ~5-8 min total místo 28 min.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write     # nutné pro push do ghcr.io

    steps:
      - name: Prepare platform pair
        # `linux/amd64` → `linux-amd64` (bezpečné jako identifikátor artefaktu / cache scope)
        run: echo "PLATFORM_PAIR=${{ matrix.platform }}" | sed 's|/|-|' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=MyInvoice.cz
            org.opencontainers.image.description=Czech invoicing system (PHP 8.5 + Vue 3 + MariaDB), multi-supplier
            org.opencontainers.image.vendor=MyWebdesign.cz s.r.o.
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # GHA cache — per-platform scope, aby se amd64/arm64 navzájem nepřepisovaly.
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to:   type=gha,scope=${{ env.PLATFORM_PAIR }},mode=min

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Vytvoří tags podle eventu:
      # - tag push v1.2.3 → image tagy: 1.2.3, 1.2, latest
      # - workflow_dispatch → image tag: <input>
      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # Production bundle — full deployable tar.gz s vendor/, web/dist/,
  # manual/generated/, manual/manual.pdf — uploadne jako release asset.
  # Slouží pro „native auto-update" (UI v Settings → Aktualizace stáhne
  # tarball a rozbalí ho přes hostingy bez Composer / Node).
  bundle:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # nutné pro upload release asset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, gd, intl, zip, pdo_mysql, exif, bcmath
          coverage: none
          tools: composer:v2

      - name: Set up Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Composer install (production)
        working-directory: api
        run: composer install --no-dev --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: pnpm install + build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Generate manual (HTML + PDF)
        run: |
          php tools/generateManualHtml.php
          php tools/exportManualToPdf.php

      - name: Tag from ref
        id: tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build production bundle tarball
        # Vyloučí: .git, .github, source/, node_modules, api/vendor.prod (cache),
        # api/.phpunit.cache, api/tests, log/, storage/, private/, cfg.*, web/src.
        # Zahrne: api/vendor/, web/dist/, manual/ (vč. manual.pdf), root soubory.
        #
        # Pozn.: tarball se píše do /tmp, ne do CWD — jinak tar detekuje, že
        # archiv sám sebe modifikuje během čtení ("file changed as we read it",
        # exit 1), protože CWD je `.` v archivu.
        run: |
          BUNDLE="myinvoice-${{ steps.tag.outputs.tag }}.tar.gz"
          TMP_BUNDLE="/tmp/$BUNDLE"
          tar -czf "$TMP_BUNDLE" \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./source' \
            --exclude='./node_modules' \
            --exclude='./api/vendor.prod' \
            --exclude='./api/.phpunit.cache' \
            --exclude='./api/tests' \
            --exclude='./log/*' \
            --exclude='./storage/*' \
            --exclude='./private/*' \
            --exclude='./cfg.php' \
            --exclude='./cfg.local.php' \
            --exclude='./cfg.docker.php' \
            --exclude='./.env' \
            --exclude='./web/src' \
            --exclude='./web/node_modules' \
            --exclude='./web/public' \
            --exclude='./web/index.html' \
            --exclude='./web/package.json' \
            --exclude='./web/pnpm-lock.yaml' \
            --exclude='./web/tsconfig*.json' \
            --exclude='./web/vite.config.ts' \
            --exclude='./web/eslint.config.js' \
            --exclude='*.log' \
            --transform "s,^\./,myinvoice-${{ steps.tag.outputs.tag }}/," \
            .
          mv "$TMP_BUNDLE" "$BUNDLE"
          ls -lh "$BUNDLE"
          sha256sum "$BUNDLE" > "$BUNDLE.sha256"
          echo "BUNDLE=$BUNDLE" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BUNDLE }}
            ${{ env.BUNDLE }}.sha256
