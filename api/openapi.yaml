        imported_by_user_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    BankStatementDetail:
      allOf:
        - $ref: '#/components/schemas/BankStatement'
        - type: object
          properties:
            transactions:
              type: array
              items: { $ref: '#/components/schemas/BankTransaction' }

    BankTransaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
