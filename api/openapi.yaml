        amount: { type: number, format: float, example: 12500.00 }
        currency: { type: string, example: CZK }
        variable_symbol: { type: string, nullable: true }
        counter_account: { type: string, nullable: true }
        counter_name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        status:
          type: string
          enum: [unmatched, matched, ignored]
