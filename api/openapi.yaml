            avg_payment_days: { type: number, nullable: true }
            status_counts_ytd:
              type: object
              additionalProperties: { type: integer }
        overdue:
          type: array
          items: { $ref: '#/components/schemas/Invoice' }
        unpaid_upcoming:
          type: array
          items: { $ref: '#/components/schemas/Invoice' }
        top_clients_ytd:
          type: array
          items:
            type: object
            properties:
              client_id: { type: integer }
              company_name: { type: string }
              currency: { type: string }
              total: { type: number }
              invoices_count: { type: integer }
        top_clients_prev_year:
          type: array
          items: { type: object }
        revenue_by_month:
          type: array
          items:
            type: object
            properties:
              month: { type: string, example: "2026-04" }
              currency: { type: string }
              total: { type: number }
        pending_approvals:
          type: object
          properties:
            requested: { type: integer }
            overdue: { type: integer, description: "Bez reakce > 5 dní" }

    BankStatement:
      type: object
      properties:
        id: { type: integer, format: int64 }
        supplier_id: { type: integer }
        filename: { type: string, example: "vypis_2026_05.gpc" }
