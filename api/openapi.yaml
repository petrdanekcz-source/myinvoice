                  prev_year_ytd: { type: number }
                  change_pct: { type: number, nullable: true }
            issued_count_ytd: { type: integer }
            overdue_count: { type: integer }
            overdue_per_currency:
              type: array
              items:
                type: object
                properties:
                  currency: { type: string }
                  count: { type: integer }
